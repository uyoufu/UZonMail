version: '3.8'

services:
  uzon-mail:
    container_name: 'uzon-mail'
    image: node:lts-bullseye
    volumes:
      - ${SRC}:/app/uzon-mail
    working_dir: /app/uzon-mail
    ports:
      - 9000:9000
    #command: ["sh","-c","npm run dev"]

    # 为容器启动一个轻量级的 init 系统，可以处理孤儿进程并转发信号，解决 stop 速度慢的问题
    init: true
    command: [ "sh", "-c", "exec sleep infinity" ]

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: uzon-mail
      POSTGRES_USER: uzon-mail
      POSTGRES_PASSWORD: uzon-mail
    volumes:
      - ./docker/postgresql/data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U uzon-mail -d uzon-mail" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
